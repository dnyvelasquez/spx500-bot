name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Update VPS
    runs-on: ubuntu-latest

    steps:
      - name: SSH → update.ps1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script:   powershell -ExecutionPolicy Bypass -File C:\spx500-bot\update.ps1
